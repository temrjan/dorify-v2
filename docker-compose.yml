services:
  dorify-backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: dorify-backend
    restart: unless-stopped
    env_file: ./.env
    security_opt: [no-new-privileges:true]
    mem_limit: 256m
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [proxy, internal]

  dorify-static:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: dorify-static
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
    mem_limit: 30m
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:80/health']
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [proxy]

  dorify-bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    container_name: dorify-bot
    restart: unless-stopped
    env_file: ./apps/bot/.env
    security_opt: [no-new-privileges:true]
    mem_limit: 80m
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [internal]

networks:
  proxy:
    external: true
  internal:
    external: true
