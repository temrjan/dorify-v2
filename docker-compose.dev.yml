services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: dorify-v2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dorify_user
      POSTGRES_PASSWORD: dorify_dev_pass
      POSTGRES_DB: dorify_v2_db
    ports:
      - '5432:5432'
    volumes:
      - dorify_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dorify_user -d dorify_v2_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dorify-v2-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dorify_pg_data:
